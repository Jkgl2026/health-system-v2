<svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg">
  <!-- 脊柱解剖图 -->
  <defs>
    <linearGradient id="vertebra" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fcd34d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef3c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="disc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bfdbfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景轮廓 -->
  <rect x="50" y="50" width="200" height="420" rx="30" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>
  
  <!-- 颈椎 (C1-C7) -->
  <g id="cervical">
    <text x="30" y="95" font-size="10" fill="#3b82f6" font-weight="bold">颈椎 C1-C7</text>
    <text x="30" y="107" font-size="8" fill="#666">前凸曲度</text>
    
    <!-- C1 寰椎 -->
    <ellipse cx="150" cy="80" rx="25" ry="8" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <text x="175" y="83" font-size="6" fill="#92400e">C1</text>
    
    <!-- C2 枢椎 -->
    <ellipse cx="150" cy="95" rx="22" ry="7" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <text x="175" y="98" font-size="6" fill="#92400e">C2</text>
    
    <!-- C3-C7 -->
    <ellipse cx="150" cy="108" rx="18" ry="6" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <ellipse cx="150" cy="120" rx="18" ry="6" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <ellipse cx="150" cy="132" rx="18" ry="6" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <ellipse cx="150" cy="144" rx="18" ry="6" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <ellipse cx="150" cy="156" rx="18" ry="6" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <text x="175" y="160" font-size="6" fill="#92400e">C7</text>
  </g>
  
  <!-- 椎间盘示意 -->
  <rect x="135" y="162" width="30" height="3" fill="url(#disc)" rx="1"/>
  
  <!-- 胸椎 (T1-T12) -->
  <g id="thoracic">
    <text x="230" y="185" font-size="10" fill="#22c55e" font-weight="bold">胸椎 T1-T12</text>
    <text x="230" y="197" font-size="8" fill="#666">后凸曲度</text>
    
    <!-- T1-T12 -->
    <ellipse cx="150" cy="175" rx="20" ry="7" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <rect x="140" y="181" width="20" height="2" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="188" rx="20" ry="7" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <rect x="140" y="194" width="20" height="2" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="201" rx="20" ry="7" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <rect x="140" y="207" width="20" height="2" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="214" rx="20" ry="7" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <rect x="140" y="220" width="20" height="2" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="227" rx="20" ry="7" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <rect x="140" y="233" width="20" height="2" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="240" rx="20" ry="7" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <rect x="140" y="246" width="20" height="2" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="253" rx="20" ry="7" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <rect x="140" y="259" width="20" height="2" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="266" rx="20" ry="7" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <rect x="140" y="272" width="20" height="2" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="279" rx="20" ry="7" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <rect x="140" y="285" width="20" height="2" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="292" rx="20" ry="7" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <rect x="140" y="298" width="20" height="2" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="305" rx="20" ry="7" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <rect x="140" y="311" width="20" height="2" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="318" rx="20" ry="7" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
    <text x="175" y="320" font-size="6" fill="#92400e">T12</text>
  </g>
  
  <!-- 腰椎 (L1-L5) -->
  <g id="lumbar">
    <text x="30" y="345" font-size="10" fill="#ef4444" font-weight="bold">腰椎 L1-L5</text>
    <text x="30" y="357" font-size="8" fill="#666">前凸曲度</text>
    
    <rect x="140" y="326" width="20" height="2" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="335" rx="25" ry="9" fill="url(#vertebra)" stroke="#d97706" stroke-width="1.5"/>
    <rect x="138" y="343" width="24" height="3" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="353" rx="25" ry="9" fill="url(#vertebra)" stroke="#d97706" stroke-width="1.5"/>
    <rect x="138" y="361" width="24" height="3" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="371" rx="25" ry="9" fill="url(#vertebra)" stroke="#d97706" stroke-width="1.5"/>
    <rect x="138" y="379" width="24" height="3" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="389" rx="25" ry="9" fill="url(#vertebra)" stroke="#d97706" stroke-width="1.5"/>
    <rect x="138" y="397" width="24" height="3" fill="url(#disc)" rx="1"/>
    <ellipse cx="150" cy="407" rx="25" ry="9" fill="url(#vertebra)" stroke="#d97706" stroke-width="1.5"/>
    <text x="182" y="410" font-size="6" fill="#92400e">L5</text>
  </g>
  
  <!-- 骶骨和尾骨 -->
  <g id="sacrum">
    <text x="230" y="430" font-size="10" fill="#9333ea" font-weight="bold">骶骨</text>
    <path d="M130 420 L125 460 L175 460 L170 420 Z" fill="url(#vertebra)" stroke="#d97706" stroke-width="1.5"/>
    <text x="145" y="445" font-size="7" fill="#92400e">骶骨</text>
    
    <text x="230" y="465" font-size="8" fill="#666">尾骨</text>
    <path d="M135 465 L150 485 L165 465" fill="url(#vertebra)" stroke="#d97706" stroke-width="1"/>
  </g>
  
  <!-- 脊柱曲度标注线 -->
  <path d="M100 80 Q90 115 100 160" stroke="#3b82f6" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  <text x="75" y="120" font-size="7" fill="#3b82f6">颈椎前凸</text>
  
  <path d="M200 180 Q210 250 200 320" stroke="#22c55e" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  <text x="210" y="250" font-size="7" fill="#22c55e">胸椎后凸</text>
  
  <path d="M100 340 Q90 380 100 410" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  <text x="75" y="380" font-size="7" fill="#ef4444">腰椎前凸</text>
  
  <!-- 图例 -->
  <rect x="20" y="10" width="260" height="30" fill="#f9fafb" stroke="#e5e7eb" rx="5"/>
  <rect x="30" y="20" width="20" height="10" fill="url(#vertebra)" stroke="#d97706" stroke-width="1" rx="2"/>
  <text x="55" y="28" font-size="8" fill="#666">椎体</text>
  <rect x="100" y="22" width="20" height="5" fill="url(#disc)" rx="1"/>
  <text x="125" y="28" font-size="8" fill="#666">椎间盘</text>
  <text x="180" y="28" font-size="8" fill="#333">共33块椎骨</text>
</svg>