<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- зӯӢиҶңй“ҫз»јеҗҲеӣҫ - жҳҫзӨә6жқЎдё»иҰҒзӯӢиҶңй“ҫ -->
  <defs>
    <linearGradient id="frontLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fca5a5;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="backLine" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="lateralLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#86efac;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="spiralLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8b4fe;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="deepLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdba74;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="armLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#67e8f9;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  
  <!-- иғҢжҷҜдәәдҪ“иҪ®е»“ -->
  <g opacity="0.3">
    <ellipse cx="200" cy="50" rx="40" ry="50" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <rect x="150" y="100" width="100" height="140" rx="12" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <rect x="100" y="105" width="30" height="120" rx="10" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <rect x="270" y="105" width="30" height="120" rx="10" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <rect x="160" y="240" width="35" height="180" rx="10" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <rect x="205" y="240" width="35" height="180" rx="10" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  </g>
  
  <!-- еүҚиЎЁй“ҫ (Front Line) - жӯЈйқўдёӯеҝғ -->
  <path d="M200 45 L200 100 L200 180 L200 240 L200 420 L200 450" 
        stroke="url(#frontLine)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="200" cy="45" r="6" fill="#ef4444"/>
  <circle cx="200" cy="100" r="5" fill="#ef4444"/>
  <circle cx="200" cy="180" r="5" fill="#ef4444"/>
  <circle cx="200" cy="240" r="5" fill="#ef4444"/>
  <circle cx="200" cy="350" r="5" fill="#ef4444"/>
  <circle cx="200" cy="420" r="5" fill="#ef4444"/>
  <text x="220" y="48" font-size="10" fill="#ef4444" font-weight="bold">еүҚиЎЁй“ҫ</text>
  <text x="220" y="60" font-size="8" fill="#666">и¶іиғҢзӯӢиҶңвҶ’иғ«йӘЁеүҚиӮҢ</text>
  <text x="220" y="70" font-size="8" fill="#666">вҶ’иӮЎзӣҙиӮҢвҶ’и…№зӣҙиӮҢ</text>
  <text x="220" y="80" font-size="8" fill="#666">вҶ’иғёйӘЁзӯӢиҶңвҶ’иғёй”Ғд№ізӘҒиӮҢ</text>
  
  <!-- еҗҺиЎЁй“ҫ (Back Line) - иғҢйқўдёӯеҝғ -->
  <path d="M200 450 L200 420 L200 350 L200 240 L200 180 L200 100 L200 45" 
        stroke="url(#backLine)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="15,5"/>
  <text x="80" y="350" font-size="10" fill="#3b82f6" font-weight="bold">еҗҺиЎЁй“ҫ</text>
  <text x="80" y="362" font-size="8" fill="#666">и¶іеә•зӯӢиҶңвҶ’и…“иӮ иӮҢ</text>
  <text x="80" y="372" font-size="8" fill="#666">вҶ’и…ҳз»іиӮҢвҶ’з«–и„ҠиӮҢ</text>
  <text x="80" y="382" font-size="8" fill="#666">вҶ’еёҪзҠ¶и…ұиҶң</text>
  
  <!-- дҪ“дҫ§й“ҫ (Lateral Line) - е·Ұдҫ§ -->
  <path d="M160 45 L155 80 L145 120 L140 180 L145 240 L150 350 L155 420 L160 450" 
        stroke="url(#lateralLine)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <circle cx="160" cy="45" r="5" fill="#22c55e"/>
  <circle cx="145" cy="120" r="4" fill="#22c55e"/>
  <circle cx="145" cy="240" r="4" fill="#22c55e"/>
  <circle cx="155" cy="350" r="4" fill="#22c55e"/>
  <text x="50" y="200" font-size="10" fill="#22c55e" font-weight="bold">дҪ“дҫ§й“ҫ</text>
  <text x="50" y="212" font-size="8" fill="#666">и…“йӘЁиӮҢвҶ’й«Ӯиғ«жқҹ</text>
  <text x="50" y="222" font-size="8" fill="#666">вҶ’и…№еӨ–ж–ңиӮҢвҶ’ж–ңж–№иӮҢ</text>
  
  <!-- дҪ“дҫ§й“ҫ - еҸідҫ§ -->
  <path d="M240 45 L245 80 L255 120 L260 180 L255 240 L250 350 L245 420 L240 450" 
        stroke="url(#lateralLine)" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- иһәж—Ӣй“ҫ (Spiral Line) - иһәж—Ӣиө°еҗ‘ -->
  <path d="M115 100 Q100 130 115 160 Q140 200 175 210 Q210 220 260 200 Q280 180 285 150 Q285 120 270 105" 
        stroke="url(#spiralLine)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <text x="280" y="140" font-size="10" fill="#a855f7" font-weight="bold">иһәж—Ӣй“ҫ</text>
  <text x="280" y="152" font-size="8" fill="#666">иҸұеҪўиӮҢвҶ’еүҚй”ҜиӮҢ</text>
  <text x="280" y="162" font-size="8" fill="#666">вҶ’и…№еӨ–ж–ңиӮҢвҶ’й«Ӯиғ«жқҹ</text>
  
  <!-- ж·ұеүҚзәҝ (Deep Front Line) - дёӯеҝғж·ұйғЁ -->
  <path d="M200 420 L200 350 L195 280 L190 220 L195 180 L200 140 L205 100" 
        stroke="url(#deepLine)" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="5,3"/>
  <text x="80" y="280" font-size="10" fill="#f97316" font-weight="bold">ж·ұеүҚзәҝ</text>
  <text x="80" y="292" font-size="8" fill="#666">и¶іеә•ж·ұеұӮвҶ’иғ«йӘЁеҗҺиӮҢ</text>
  <text x="80" y="302" font-size="8" fill="#666">вҶ’зӣҶеә•иӮҢвҶ’иҶҲиӮҢ</text>
  <text x="80" y="312" font-size="8" fill="#666">вҶ’еҝғеҢ…вҶ’ж–ңи§’иӮҢ</text>
  
  <!-- жүӢиҮӮй“ҫ (Arm Lines) -->
  <path d="M150 105 L115 130 L100 160 L95 200 L90 240" 
        stroke="url(#armLine)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M250 105 L285 130 L300 160 L305 200 L310 240" 
        stroke="url(#armLine)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <text x="85" y="130" font-size="10" fill="#06b6d4" font-weight="bold">жүӢиҮӮй“ҫ</text>
  <text x="310" y="130" font-size="8" fill="#666">иғёе°ҸиӮҢвҶ’иӮұдәҢеӨҙиӮҢ</text>
  <text x="310" y="140" font-size="8" fill="#666">вҶ’еүҚиҮӮеұҲ/дјёиӮҢ</text>
  
  <!-- еӣҫдҫӢ -->
  <rect x="10" y="460" width="380" height="35" fill="#f9fafb" stroke="#e5e7eb" rx="5"/>
  <circle cx="25" cy="477" r="5" fill="#ef4444"/><text x="35" y="480" font-size="8" fill="#666">еүҚиЎЁй“ҫ</text>
  <circle cx="85" cy="477" r="5" fill="#3b82f6"/><text x="95" y="480" font-size="8" fill="#666">еҗҺиЎЁй“ҫ</text>
  <circle cx="145" cy="477" r="5" fill="#22c55e"/><text x="155" y="480" font-size="8" fill="#666">дҪ“дҫ§й“ҫ</text>
  <circle cx="205" cy="477" r="5" fill="#a855f7"/><text x="215" y="480" font-size="8" fill="#666">иһәж—Ӣй“ҫ</text>
  <circle cx="265" cy="477" r="5" fill="#f97316"/><text x="275" y="480" font-size="8" fill="#666">ж·ұеүҚзәҝ</text>
  <circle cx="325" cy="477" r="5" fill="#06b6d4"/><text x="335" y="480" font-size="8" fill="#666">жүӢиҮӮй“ҫ</text>
</svg>